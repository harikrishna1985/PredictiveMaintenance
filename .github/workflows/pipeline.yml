name: Predictive Maintenance End-to-End Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify project structure
        run: |
          ls -R
          test -f src/01_data_prep.py
          test -f src/02_train.py
          test -f src/03_evaluate.py
          test -f app.py
          test -f Dockerfile
          test -f README.md

      - name: Run syntax checks
        run: |
          python -m compileall src
          python -m compileall app.py

      - name: Run Data Preparation
        run: |
          python src/01_data_prep.py

      - name: Run Model Training and Tuning
        run: |
          python src/02_train.py

      - name: Run Model Evaluation
        run: |
          python src/03_evaluate.py

      - name: Show generated artifacts
        run: |
          echo "Artifacts folder:"
          ls -R artifacts || true
          echo "Data folder:"
          ls -R data || true

      - name: Deploy app files to Hugging Face Space
        run: |
          python push_to_hf_space.py
