name: Predictive Maintenance CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint basic syntax
        run: |
          python -m compileall .

      - name: Smoke test app imports
        run: |
          python -c "import app"
          python -c "from src.predict import load_config"

      - name: Optional model test
        run: |
          echo "Add model validation tests here"

      - name: Deploy files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python push_to_hf_space.py